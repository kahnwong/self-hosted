  # ---- hitkeep ----
  hitkeep:
    image: pascalebeier/hitkeep:2.7.0
    container_name: hitkeep
    restart: always
    # ports:
    #   - "8080:8080"
    volumes:
      - /opt/hitkeep:/var/lib/hitkeep/data
    env_file:
      - .env.app.hitkeep
  # ---- caddy ----
  caddy:
    image: caddy:2
    container_name: caddy
    restart: always
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./Caddyfile.gcp:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
volumes:
  caddy_data:
