services:
  syncthing:
    image: linuxserver/syncthing:2.1.1
    container_name: syncthing
    environment:
      PUID: 0
      PGID: 0
      TZ: Asia/Bangkok
      UMASK_SET: <022>
    volumes:
      - /opt/syncthing/config:/config
      - /opt/syncthing/:/data
      - /opt/immich/upload:/data/immich/upload
    ports:
      - 8384:8384
      - 22000:22000
      - 21027:21027/udp
    restart: always
    networks:
      - syncthing
  transmission:
    image: linuxserver/transmission:2021.11.18
    container_name: transmission
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Bangkok
    volumes:
      - /opt/transmission/config:/config
      - /opt/transmission/downloads:/downloads
      - /opt/transmission/watch:/watch
    ports:
      - 9000:9091
      - 51413:51413
      - 51413:51413/udp
    restart: always
    env_file: .env.app.transmission
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - transmission
  ladder:
    image: ghcr.io/everywall/ladder:v0.0.23
    container_name: ladder
    environment:
      RULESET: "https://raw.githubusercontent.com/everywall/ladder-rules/main/ruleset.yaml"
    ports:
      - 8080:8080
    restart: always
    networks:
      - ladder
networks:
  syncthing:
    driver: bridge
  transmission:
    driver: bridge
  ladder:
    driver: bridge
