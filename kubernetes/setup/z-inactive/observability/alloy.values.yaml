alloy:
  configMap:
    content: |
      // Discover logs from Kubernetes pods
      discovery.kubernetes "pods" {
        role = "pod"

        namespaces {
          names = ["development"]
        }
      }

      // Convert Kubernetes metadata into Loki labels.
      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          regex         = "(.+)"
          target_label  = "service_name"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          regex         = "(.+)"
          target_label  = "service_name"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          regex         = "(.+)"
          target_label  = "service_name"
        }
      }

      // Read logs from Kubernetes pods via the Kubernetes API.
      loki.source.kubernetes "pod_logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.pod_logs.receiver]
      }

      loki.process "pod_logs" {
        forward_to = [loki.write.local.receiver]

        stage.drop {
          older_than          = "24h"
          drop_counter_reason = "too_old"
        }
      }

      // Send logs to your Loki service.
      loki.write "local" {
        endpoint {
          url = "http://loki-gateway.observability.svc.cluster.local/loki/api/v1/push"
        }
      }

      // Receive OTLP traces from Beyla and forward them to Tempo.
      otelcol.receiver.otlp "beyla" {
        http {
          endpoint = "0.0.0.0:4318"
        }

        grpc {
          endpoint = "0.0.0.0:4317"
        }

        output {
          traces  = [otelcol.exporter.otlphttp.tempo.input]
          metrics = [otelcol.exporter.prometheus.default.input]
        }
      }

      otelcol.exporter.otlphttp "tempo" {
        client {
          endpoint = "http://tempo.observability.svc.cluster.local:4318"
        }
      }

      otelcol.exporter.prometheus "default" {
        forward_to = [prometheus.remote_write.default.receiver]
      }

      prometheus.remote_write "default" {
        endpoint {
          url = "http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/api/v1/write"
        }
      }
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
controller:
  type: deployment
configReloader:
  enabled: true
