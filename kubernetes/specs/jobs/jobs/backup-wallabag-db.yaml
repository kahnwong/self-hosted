name: backup-wallabag-db
schedule: "2 0 * * *"
containers:
  - name: backup-wallabag-db
    repository: ghcr.io/kahnwong/docker-aws-backup
    tag: f09a8ec
    env:
      - name: MODE
        value: DB_POSTGRES
      - name: SERVICE_NAME
        value: wallabag
      - name: POSTGRES_USERNAME
        valueFrom:
          secretKeyRef:
            name: wallabag-postgres
            key: username
      - name: POSTGRES_PASSWORD
        valueFrom:
          secretKeyRef:
            name: wallabag-postgres
            key: password
      - name: POSTGRES_HOSTNAME
        value: wallabag-postgres-rw.services.svc.cluster.local
    envFrom:
      - secretRef:
          name: backup
