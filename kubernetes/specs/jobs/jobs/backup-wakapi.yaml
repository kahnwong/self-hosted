name: backup-wakapi
schedule: "3 0 * * *"
containers:
  - name: backup-wakapi
    repository: ghcr.io/kahnwong/docker-aws-backup
    tag: f09a8ec
    env:
      - name: MODE
        value: DB_POSTGRES
      - name: SERVICE_NAME
        value: wakapi
      - name: POSTGRES_USERNAME
        valueFrom:
          secretKeyRef:
            name: wakapi-postgres
            key: username
      - name: POSTGRES_PASSWORD
        valueFrom:
          secretKeyRef:
            name: wakapi-postgres
            key: password
      - name: POSTGRES_HOSTNAME
        value: wakapi-postgres-rw.services.svc.cluster.local
    envFrom:
      - secretRef:
          name: backup
