kind: Deployment
name: trmnl
replicaCount: 1
containers:
  - name: trmnl
    repository: ghcr.io/kahnwong/trmnl-beszel
    tag: 7e0a437
    port: 3000
    envFrom:
      - secretRef:
          name: trmnl
    volumeMounts:
      - name: data
        mountPath: /data
volumes:
  - name: data
    hostPath:
      path: /opt/trmnl/data
service:
  port: 3000
  nodePort: 30086
imagePullSecrets:
  - name: ghcr-cfg
