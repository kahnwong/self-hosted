kind: Deployment
name: weather-api
replicaCount: 1
kubeGreen: true
containers:
  - name: weather-api
    repository: ghcr.io/kahnwong/weather-api
    tag: ad26d87
    port: 3000
    env:
      - name: LISTEN_ADDR
        value: ":3000"
      - name: LOG_LEVEL
        value: error
    envFrom:
      - secretRef:
          name: weather-api
    livenessProbeScheme: tcp
service:
  port: 3000
  nodePort: 30078
