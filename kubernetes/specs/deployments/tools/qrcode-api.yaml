kind: Deployment
name: qrcode-api
replicaCount: 1
kubeGreen: true
containers:
  - name: qrcode-api
    repository: ghcr.io/kahnwong/qrcode-api
    tag: cc003e9
    port: 3000
    env:
      - name: LISTEN_ADDR
        value: ":3000"
      - name: LOG_LEVEL
        value: error
    envFrom:
      - secretRef:
          name: qrcode-api
    volumeMounts:
      - name: data
        mountPath: /data
    livenessProbeScheme: tcp
volumes:
  - name: data
    hostPath:
      path: /opt/qrcode-api/data
service:
  port: 3000
  nodePort: 30077
