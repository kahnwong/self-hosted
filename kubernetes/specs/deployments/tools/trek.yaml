kind: Deployment
name: trek
replicaCount: 1
kubeGreen: true
containers:
  - name: trek
    repository: mauriceboe/trek
    tag: 3.1.4
    port: 3000
    envFrom:
      - secretRef:
          name: trek
    volumeMounts:
      - name: data
        mountPath: /app/data
      - name: uploads
        mountPath: /app/uploads
volumes:
  - name: data
    hostPath:
      path: /opt/trek/data
  - name: uploads
    hostPath:
      path: /opt/trek/uploads
service:
  port: 3000
  nodePort: 30074
