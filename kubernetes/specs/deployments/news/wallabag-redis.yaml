kind: StatefulSet
name: wallabag-redis # valkey does not support setting password via ENV. this is not critical, so here it stays.
replicaCount: 1
containers:
  - name: redis
    repository: redis
    tag: 8.6.2-alpine
    port: 6379
    livenessProbeScheme: tcp
    envFrom:
      - secretRef:
          name: wallabag-redis
service:
  port: 6379
