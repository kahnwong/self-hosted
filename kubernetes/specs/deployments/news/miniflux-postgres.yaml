# maintenance: run `TRUNCATE TABLE sessions;`
kind: StatefulSet
name: miniflux-postgres
replicaCount: 1
containers:
  - name: postgres
    repository: postgres
    tag: 18.3
    port: 5432
    livenessProbeScheme: tcp
    envFrom:
      - secretRef:
          name: miniflux-postgres
    volumeMounts:
      - name: miniflux-data
        mountPath: /var/lib/postgresql
service:
  port: 5432
volumes:
  - name: miniflux-data
    hostPath:
      path: /opt/miniflux/db
