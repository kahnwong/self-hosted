kind: Deployment
name: immich
replicaCount: 1
kubeGreen: true
containers:
  - name: immich-server
    repository: ghcr.io/immich-app/immich-server
    tag: v3.0.3
    port: 2283
    env:
      - name: IMMICH_LOG_LEVEL
        value: error
    envFrom:
      - secretRef:
          name: immich
    volumeMounts:
      - name: immich-upload
        mountPath: /usr/src/app/upload
volumes:
  - name: immich-upload
    hostPath:
      path: /opt/immich/upload
service:
  port: 2283
  nodePort: 30030
