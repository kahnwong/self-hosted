kind: Deployment
name: immich-machine-learning
replicaCount: 1
kubeGreen: true
containers:
  - name: immich-machine-learning
    repository: ghcr.io/immich-app/immich-machine-learning
    tag: v3.0.3
    port: 3003 # https://github.com/immich-app/immich/blob/main/machine-learning/app/config.py#L28C17-L28C21
    env:
      - name: IMMICH_LOG_LEVEL
        value: error
    envFrom:
      - secretRef:
          name: immich-machine-learning
    volumeMounts:
      - name: immich-cache
        mountPath: /cache
volumes:
  - name: immich-cache
    hostPath:
      path: /opt/immich/cache
service:
  port: 3003
