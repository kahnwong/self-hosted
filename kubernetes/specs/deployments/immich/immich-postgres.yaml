kind: StatefulSet
name: immich-postgres
replicaCount: 1
containers:
  - name: postgres
    repository: ghcr.io/immich-app/postgres
    tag: 18-vectorchord0.5.3-pgvector0.8.1
    port: 5432
    livenessProbeScheme: tcp
    envFrom:
      - secretRef:
          name: immich-postgres
    volumeMounts:
      - name: immich-data
        mountPath: /var/lib/postgresql
volumes:
  - name: immich-data
    hostPath:
      path: /opt/immich/db
service:
  port: 5432
